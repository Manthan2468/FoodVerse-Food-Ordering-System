{% extends 'base_order.html' %}
{% load static %}

{% block body %}

<section class="address-form-page">
<div class="container">

<div class="form-header text-center">
    <h2>Add New Address</h2>
    <p>Add a delivery location for your orders</p>
</div>

<div class="address-form-card">

<form method="POST" action="{% url 'add_new_address' %}">
{% csrf_token %}

<div class="form-group">
<label>Full Name</label>
<input
type="text"
name="full_name"
placeholder="Enter full name"
required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input
type="text"
name="phone"
placeholder="Enter phone number"
required>
</div>

<div class="form-group">
<label>Street Address</label>
<textarea
name="address"
placeholder="Flat, street, area"
required></textarea>
</div>

<div class="form-row">
<div class="form-group">
<label>City</label>
<input
name="city"
type="text"
placeholder="City"
required>
</div>

<div class="form-group">
<label>State</label>
<input
name="state"
type="text"
placeholder="State"
required>
</div>
</div>

<div class="form-group">
<label>Pincode</label>
<input
type="text"
name="pincode"
placeholder="Pincode"
required>
</div>


<div class="button-group">
<a href="{% url 'change_address' %}"
class="cancel-btn">
Cancel
</a>

<button type="submit"
class="save-btn">
Save Address
</button>
</div>

</form>

</div>

</div>
</section>

{% endblock %}
