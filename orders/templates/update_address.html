{% extends 'base_order.html' %}
{% load static %}

{% block body %}

<section class="address-form-page">
<div class="container">

<div class="form-header text-center">
    <h2>Update Address</h2>
    <p>Edit your delivery details</p>
</div>

<div class="address-form-card">

<form method="POST">
{% csrf_token %}

<div class="form-group">
<label>Full Name</label>
<input
type="text"
name="full_name"
value="{{ address.full_name }}"
required>
</div>


<div class="form-group">
<label>Phone Number</label>
<input
type="text"
name="phone"
value="{{ address.phone }}"
required>
</div>


<div class="form-group">
<label>Street Address</label>
<textarea
name="address"
required>{{ address.address }}</textarea>
</div>


<div class="form-row">

<div class="form-group">
<label>City</label>
<input
type="text"
name="city"
value="{{ address.city }}"
required>
</div>

<div class="form-group">
<label>State</label>
<input
type="text"
name="state"
value="{{ address.state }}"
required>
</div>

</div>


<div class="form-group">
<label>Pincode</label>
<input
type="text"
name="pincode"
value="{{ address.pincode }}"
required>
</div>

<div class="button-group">
<a href="{% url 'change_address' %}"
class="cancel-btn">
Cancel
</a>

<button
type="submit"
class="save-btn">
Update Address
</button>
</div>

</form>

</div>

</div>
</section>

{% endblock %}
